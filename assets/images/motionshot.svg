<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">MotionShot thumbnail</title>
  <desc id="desc">A schematic thumbnail showing adaptive motion transfer from a reference object to a target object.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e8eef6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#1768b3"/>
      <stop offset="1" stop-color="#46a0d8"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#d97922"/>
      <stop offset="1" stop-color="#f4b44d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1768b3"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="54" y="54" width="852" height="432" rx="32" fill="#fff" stroke="#dbe2ea" stroke-width="3"/>
  <text x="480" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#20242a">MotionShot</text>
  <text x="480" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#687383">adaptive motion transfer across objects</text>
  <g transform="translate(128 206)">
    <rect x="0" y="0" width="210" height="170" rx="24" fill="#eef6fd" stroke="#b8d3e9" stroke-width="3"/>
    <circle cx="75" cy="72" r="34" fill="url(#blue)"/>
    <rect x="116" y="42" width="56" height="88" rx="14" fill="#6db3df"/>
    <path d="M55 120 C87 88 122 156 170 112" fill="none" stroke="#1768b3" stroke-width="10" stroke-linecap="round"/>
    <text x="105" y="216" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#314155">Reference</text>
  </g>
  <g transform="translate(626 206)">
    <rect x="0" y="0" width="210" height="170" rx="24" fill="#fff6e6" stroke="#f0c47a" stroke-width="3"/>
    <path d="M65 38 L151 70 L127 143 L43 118 Z" fill="url(#orange)"/>
    <circle cx="122" cy="92" r="30" fill="#ffd277"/>
    <path d="M47 128 C82 92 124 154 170 106" fill="none" stroke="#c76014" stroke-width="10" stroke-linecap="round"/>
    <text x="105" y="216" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#314155">Target</text>
  </g>
  <path d="M390 268 C438 222 516 222 570 268" fill="none" stroke="#1768b3" stroke-width="11" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M390 326 C444 376 520 376 570 326" fill="none" stroke="#d97922" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 16" marker-end="url(#arrow)"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#475465">
    <text x="480" y="250" text-anchor="middle">semantic match</text>
    <text x="480" y="386" text-anchor="middle">shape retargeting</text>
  </g>
</svg>
